# ============================================================
# render.yaml — Infrastructure as Code cho Render
#
# Docs: https://render.com/docs/blueprint-spec
# Commit file này vào git → Render tự sync infrastructure.
# ============================================================

services:
  # ──────────────────────────────────────
  # Web Service — AI Agent
  # ──────────────────────────────────────
  - type: keyvalue
    name: agent-cache
    plan: free
    ipAllowList: [] # chỉ cho internal connections, không mở public Redis/Valkey

    - type: web
    name: ai-agent
    runtime: python
    plan: free
    rootDir: 03-cloud-deployment/railway
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        value: dummy-key
      - key: ENVIRONMENT
        value: production
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: agent-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: agent-cache
          property: port

    # Disk (nếu agent cần lưu file)
    # disk:
    #   name: agent-data
    #   mountPath: /data
    #   sizeGB: 1

  # ──────────────────────────────────────
  # Redis (dùng Render Redis add-on)
  # ──────────────────────────────────────

